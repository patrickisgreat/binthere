name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - name: List available simulators
        run: xcrun simctl list devices available
      - name: Resolve destination
        id: dest
        run: |
          # Pick the first available iPhone simulator
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          print('iPhone 16')
          ")
          echo "simulator=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEST"
      - name: Build
        run: |
          xcodebuild build \
            -scheme binthere \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.simulator }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
      - name: Run Tests
        run: |
          xcodebuild test \
            -scheme binthere \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.simulator }}" \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
