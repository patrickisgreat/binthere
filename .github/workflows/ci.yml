name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Create Secrets.xcconfig
        run: |
          cat > Secrets.xcconfig << EOF
          SUPABASE_URL = ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY = ${{ secrets.SUPABASE_ANON_KEY }}
          EOF
      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            LATEST_XCODE="/Applications/Xcode.app"
          fi
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version
      - name: Resolve destination
        id: dest
        run: |
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items()):
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          print('iPhone 16')
          ")
          echo "simulator=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEST"
      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items()):
              if 'iOS' in runtime:
                  for d in devices:
                      if d['name'] == '${{ steps.dest.outputs.simulator }}' and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          ")
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
      - name: Build
        run: |
          xcodebuild build \
            -scheme binthere \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.simulator }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -scheme binthere \
            -destination "platform=iOS Simulator,name=${{ steps.dest.outputs.simulator }}" \
            -only-testing:binthereTests \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults.xcresult
